name: Changeset check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changeset:
    name: Changeset required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: release_notes
        name: Check release-note paths
        uses: ./.github/actions/paths-changed
        with:
          paths: |
            packages/generator
            packages/prisma-next
            .changeset

      - id: should_check
        name: Check if changeset status is required
        env:
          PATHS_CHANGED: ${{ steps.release_notes.outputs.changed }}
          RELEASE_BRANCH: ${{ startsWith(github.head_ref, 'changeset-release/') }}
        run: |
          set -euo pipefail

          if [ "$RELEASE_BRANCH" = "true" ]; then
            echo "Changeset check is not required for changeset release branches."
            echo "required=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "required=$PATHS_CHANGED" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        if: steps.should_check.outputs.required == 'true'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        if: steps.should_check.outputs.required == 'true'
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        if: steps.should_check.outputs.required == 'true'
        run: pnpm install --frozen-lockfile

      - name: Check for changeset
        if: steps.should_check.outputs.required == 'true'
        run: pnpm changeset status --since=origin/main

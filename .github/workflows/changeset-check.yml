name: Changeset check

on:
  pull_request:
    branches: [main]

jobs:
  check-paths:
    runs-on: ubuntu-latest
    outputs:
      needed: ${{ steps.detect.outputs.needed }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: detect
        run: |
          if git diff --name-only origin/main...HEAD | grep -qE '^(packages/prisma-next/|\.changeset/[^/]+\.md)'; then
            echo "needed=true" >> $GITHUB_OUTPUT
          else
            echo "needed=false" >> $GITHUB_OUTPUT
          fi

  changeset:
    name: Changeset required
    needs: check-paths
    if: needs.check-paths.outputs.needed == 'true' && !startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for changeset
        run: pnpm changeset status --since=origin/main

name: Benchmark Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  BENCHMARK_DATASET_SIZE: "1000"
  BENCHMARK_WARMUP_RUNS: "2"
  BENCHMARK_MEASURED_RUNS: "30"

jobs:
  benchmark-pr-compare:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install package dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Browser
        working-directory: apps/benchmark
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate benchmark clients (PR head)
        working-directory: apps/benchmark
        run: pnpm generate
        env:
          DATABASE_URL: "postgresql://placeholder@localhost:5432/placeholder"

      - name: Run benchmark suite (PR head)
        working-directory: apps/benchmark
        env:
          BENCHMARK_DATASET_SIZE: ${{ env.BENCHMARK_DATASET_SIZE }}
          BENCHMARK_WARMUP_RUNS: ${{ env.BENCHMARK_WARMUP_RUNS }}
          BENCHMARK_MEASURED_RUNS: ${{ env.BENCHMARK_MEASURED_RUNS }}
          BENCHMARK_RESULT_PATH: ${{ runner.temp }}/benchmark-results/current.json
          NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ""
          NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
        run: |
          mkdir -p "$RUNNER_TEMP/benchmark-results"
          pnpm benchmark:ci

      - name: Checkout PR base
        run: git checkout --force ${{ github.event.pull_request.base.sha }}

      - name: Install base dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure Playwright browser is available for base
        working-directory: apps/benchmark
        # Use --dry-run to read the expected install location without downloading.
        # Minor playwright versions often share the same chromium revision, so the
        # directory already exists from the HEAD install → skip entirely.
        # If it genuinely differs, attempt a 90s download then symlink HEAD's binary
        # as a fallback so CI never hangs indefinitely.
        run: |
          BROWSER_DIR=$(pnpm exec playwright install --dry-run chromium 2>&1 \
            | awk '/Install location:.*chromium_headless_shell/{print $NF}' | head -1)
          echo "Base playwright needs: $BROWSER_DIR"

          if [ -d "$BROWSER_DIR" ]; then
            echo "Already cached — skipping download."
          else
            echo "Not cached. Attempting download (90s timeout)..."
            timeout 90 pnpm exec playwright install chromium && echo "Downloaded." || {
              echo "Download failed/timed out. Symlinking HEAD chromium as fallback..."
              HEAD_DIR=$(ls "$HOME/.cache/ms-playwright" | grep "^chromium_headless_shell-" | head -1)
              if [ -n "$HEAD_DIR" ]; then
                mkdir -p "$(dirname "$BROWSER_DIR")"
                ln -sf "$HOME/.cache/ms-playwright/$HEAD_DIR" "$BROWSER_DIR"
                echo "Symlinked: $HEAD_DIR -> $BROWSER_DIR"
              fi
            }
          fi

      - name: Generate benchmark clients (PR base)
        working-directory: apps/benchmark
        run: pnpm generate
        env:
          DATABASE_URL: "postgresql://placeholder@localhost:5432/placeholder"

      - name: Run benchmark suite (PR base)
        working-directory: apps/benchmark
        env:
          BENCHMARK_DATASET_SIZE: ${{ env.BENCHMARK_DATASET_SIZE }}
          BENCHMARK_WARMUP_RUNS: ${{ env.BENCHMARK_WARMUP_RUNS }}
          BENCHMARK_MEASURED_RUNS: ${{ env.BENCHMARK_MEASURED_RUNS }}
          BENCHMARK_RESULT_PATH: ${{ runner.temp }}/benchmark-results/baseline.json
          NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ""
          NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
        run: pnpm benchmark:ci

      - name: Restore PR head
        run: |
          git checkout --force ${{ github.sha }}
          pnpm install --frozen-lockfile

      - name: Compare benchmarks
        working-directory: apps/benchmark
        run: |
          test -f "$RUNNER_TEMP/benchmark-results/baseline.json"
          test -f "$RUNNER_TEMP/benchmark-results/current.json"
          pnpm benchmark:compare \
            --baseline "$RUNNER_TEMP/benchmark-results/baseline.json" \
            --current "$RUNNER_TEMP/benchmark-results/current.json" \
            --threshold 10 \
            --json-out "$RUNNER_TEMP/benchmark-results/report.json" \
            --markdown-out "$RUNNER_TEMP/benchmark-results/report.md"

      - name: Enforce benchmark regression gate
        run: |
          jq -r '(.notices[]? | "Notice: " + .)' "$RUNNER_TEMP/benchmark-results/report.json"
          if [ "$(jq -r '.shouldFail' "$RUNNER_TEMP/benchmark-results/report.json")" = "true" ]; then
            echo "Benchmark regression gate failed." >&2
            exit 1
          fi

      - name: Publish benchmark PR comment
        if: ${{ !cancelled() && github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true
        working-directory: apps/benchmark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm benchmark:comment --body-file "$RUNNER_TEMP/benchmark-results/report.md"

      - name: Upload benchmark artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: ${{ runner.temp }}/benchmark-results/
          retention-days: 30

  publish-main-benchmark-snapshot:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install package dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Browser
        working-directory: apps/benchmark
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate benchmark clients
        working-directory: apps/benchmark
        run: pnpm generate
        env:
          DATABASE_URL: "postgresql://placeholder@localhost:5432/placeholder"

      - name: Run benchmark suite
        working-directory: apps/benchmark
        env:
          BENCHMARK_DATASET_SIZE: ${{ env.BENCHMARK_DATASET_SIZE }}
          BENCHMARK_WARMUP_RUNS: ${{ env.BENCHMARK_WARMUP_RUNS }}
          BENCHMARK_MEASURED_RUNS: ${{ env.BENCHMARK_MEASURED_RUNS }}
          BENCHMARK_RESULT_PATH: ${{ runner.temp }}/benchmark-results/main-current.json
          NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN: ""
          NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
        run: |
          mkdir -p "$RUNNER_TEMP/benchmark-results"
          pnpm benchmark:ci

      - name: Prepare public benchmark snapshot
        run: |
          mkdir -p "$RUNNER_TEMP/benchmark-public"
          cp "$RUNNER_TEMP/benchmark-results/main-current.json" "$RUNNER_TEMP/benchmark-public/latest.json"

      - name: Publish public benchmark snapshot
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: benchmark-data
          publish_dir: ${{ runner.temp }}/benchmark-public
          force_orphan: true
          enable_jekyll: false
          commit_message: "chore(benchmark): publish latest benchmark snapshot [skip ci]"

      - name: Upload benchmark artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-main
          path: ${{ runner.temp }}/benchmark-results/
          retention-days: 30

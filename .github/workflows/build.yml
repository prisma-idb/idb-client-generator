name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      schema_gen: ${{ steps.schema_gen.outputs.changed }}
      sync: ${{ steps.sync.outputs.changed }}
      prisma_next_unit: ${{ steps.prisma_next_unit.outputs.changed }}
      prisma_next_e2e: ${{ steps.prisma_next_e2e.outputs.changed }}
      client: ${{ steps.client.outputs.changed }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: schema_gen
        name: Check default generator schema test paths
        uses: ./.github/actions/paths-changed
        with:
          paths: |
            packages/generator
            tests/schema-gen
            pnpm-lock.yaml

      - id: sync
        name: Check default generator sync test paths
        uses: ./.github/actions/paths-changed
        with:
          paths: |
            packages/generator
            apps/pidb-kanban-example
            pnpm-lock.yaml

      - id: prisma_next_unit
        name: Check Prisma Next unit test paths
        uses: ./.github/actions/paths-changed
        with:
          paths: |
            packages/prisma-next
            pnpm-lock.yaml

      - id: prisma_next_e2e
        name: Check Prisma Next E2E test paths
        uses: ./.github/actions/paths-changed
        with:
          paths: |
            packages/prisma-next
            apps/prisma-next-usage
            pnpm-lock.yaml

      - id: client
        name: Check default generator client test paths
        uses: ./.github/actions/paths-changed
        with:
          paths: |
            packages/generator
            apps/usage
            pnpm-lock.yaml

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/
      - name: Lint all packages
        run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/

      - name: Generate BETTER_AUTH_SECRET
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -base64 32 | tr '/+=' '_-')" >> $GITHUB_ENV

      - name: Run typecheck commands
        run: pnpm check
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5433/postgres"
          GOOGLE_CLIENT_ID: "placeholder"
          GOOGLE_CLIENT_SECRET: "placeholder"
          PUBLIC_POSTHOG_PROJECT_TOKEN: "placeholder"
          PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"

  test-schema-gen:
    needs: changes
    if: needs.changes.outputs.schema_gen == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/

      - name: Run schema generation tests
        run: pnpm test:schema-gen

  test-sync:
    needs: changes
    if: needs.changes.outputs.sync == 'true'
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5434:5432

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Set DATABASE_URL environment variable
        run: echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5434/postgres" >> $GITHUB_ENV
      - uses: ./.github/actions/
      - name: Install Playwright Browsers
        working-directory: apps/pidb-kanban-example
        run: pnpm exec playwright install --with-deps
      - name: Generate BETTER_AUTH_SECRET
        run: echo "BETTER_AUTH_SECRET=$(openssl rand -base64 32 | tr '/+=' '_-')" >> $GITHUB_ENV
      - name: Run Sync Playwright tests
        run: pnpm test:sync
        env:
          GOOGLE_CLIENT_ID: "placeholder"
          GOOGLE_CLIENT_SECRET: "placeholder"
          PUBLIC_POSTHOG_PROJECT_TOKEN: "placeholder"
          PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-sync
          path: apps/pidb-kanban-example/playwright-report/
          retention-days: 30

  test-prisma-next:
    needs: changes
    if: needs.changes.outputs.prisma_next_unit == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/

      - name: Run prisma-next unit tests
        run: pnpm test:prisma-next

  test-prisma-next-e2e:
    needs: changes
    if: needs.changes.outputs.prisma_next_e2e == 'true'
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/

      - name: Install Playwright Browsers
        working-directory: apps/prisma-next-usage
        run: pnpm exec playwright install --with-deps

      - name: Run prisma-next E2E tests
        run: pnpm test:prisma-next-e2e

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-prisma-next
          path: apps/prisma-next-usage/playwright-report/
          retention-days: 30

  test-client:
    needs: changes
    if: needs.changes.outputs.client == 'true'
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Set DATABASE_URL environment variable
        run: echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5433/postgres" >> $GITHUB_ENV
      - uses: ./.github/actions/
      - name: Install Playwright Browsers
        working-directory: apps/usage
        run: pnpm exec playwright install --with-deps
      - name: Run Client Playwright tests
        run: pnpm test:client
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-client
          path: apps/usage/playwright-report/
          retention-days: 30

  ci-required:
    name: CI required
    needs:
      - changes
      - lint
      - typecheck
      - test-schema-gen
      - test-sync
      - test-prisma-next
      - test-prisma-next-e2e
      - test-client
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - name: Check required CI results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          SCHEMA_GEN_REQUIRED: ${{ needs.changes.outputs.schema_gen }}
          SCHEMA_GEN_RESULT: ${{ needs['test-schema-gen'].result }}
          SYNC_REQUIRED: ${{ needs.changes.outputs.sync }}
          SYNC_RESULT: ${{ needs['test-sync'].result }}
          PRISMA_NEXT_UNIT_REQUIRED: ${{ needs.changes.outputs.prisma_next_unit }}
          PRISMA_NEXT_UNIT_RESULT: ${{ needs['test-prisma-next'].result }}
          PRISMA_NEXT_E2E_REQUIRED: ${{ needs.changes.outputs.prisma_next_e2e }}
          PRISMA_NEXT_E2E_RESULT: ${{ needs['test-prisma-next-e2e'].result }}
          CLIENT_REQUIRED: ${{ needs.changes.outputs.client }}
          CLIENT_RESULT: ${{ needs['test-client'].result }}
        run: |
          set -euo pipefail

          require_success() {
            local name="$1"
            local result="$2"

            if [ "$result" != "success" ]; then
              echo "$name ended with: $result"
              exit 1
            fi
          }

          require_conditional_success() {
            local name="$1"
            local required="$2"
            local result="$3"

            if [ "$required" = "true" ]; then
              require_success "$name" "$result"
            else
              echo "$name was not required for these paths."
            fi
          }

          require_success "Path detection" "$CHANGES_RESULT"
          require_success "Lint" "$LINT_RESULT"
          require_success "Typecheck" "$TYPECHECK_RESULT"
          require_conditional_success "Schema generation tests" "$SCHEMA_GEN_REQUIRED" "$SCHEMA_GEN_RESULT"
          require_conditional_success "Default generator sync tests" "$SYNC_REQUIRED" "$SYNC_RESULT"
          require_conditional_success "Prisma Next unit tests" "$PRISMA_NEXT_UNIT_REQUIRED" "$PRISMA_NEXT_UNIT_RESULT"
          require_conditional_success "Prisma Next E2E tests" "$PRISMA_NEXT_E2E_REQUIRED" "$PRISMA_NEXT_E2E_RESULT"
          require_conditional_success "Default generator client tests" "$CLIENT_REQUIRED" "$CLIENT_RESULT"

          echo "Required CI checks are satisfied."

name: "Path change detector"
description: "Detect whether any listed paths changed in the current push or pull request"
inputs:
  paths:
    description: "Newline-separated git pathspecs to inspect"
    required: true
outputs:
  changed:
    description: "true when one or more listed paths changed"
    value: ${{ steps.detect.outputs.changed }}
runs:
  using: "composite"
  steps:
    - id: detect
      shell: bash
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        HEAD_SHA: ${{ github.sha }}
        EVENT_NAME: ${{ github.event_name }}
        PATHS: ${{ inputs.paths }}
      run: |
        set -euo pipefail

        paths=()
        while IFS= read -r path; do
          if [ -n "$path" ]; then
            paths+=("$path")
          fi
        done <<< "$PATHS"

        if [ "${#paths[@]}" -eq 0 ]; then
          echo "No paths configured for path change detection." >&2
          exit 1
        fi

        if [ -z "${BASE_SHA:-}" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
          echo "changed=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        range="$BASE_SHA..$HEAD_SHA"
        if [ "$EVENT_NAME" = "pull_request" ]; then
          range="$BASE_SHA...$HEAD_SHA"
        fi

        set +e
        git diff --quiet "$range" -- "${paths[@]}"
        status=$?
        set -e

        case "$status" in
          0) echo "changed=false" >> "$GITHUB_OUTPUT" ;;
          1) echo "changed=true" >> "$GITHUB_OUTPUT" ;;
          *) exit "$status" ;;
        esac
